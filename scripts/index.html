<!DOCTYPE html>
<html>
<body>
<script>
async function ai_edge_gallery_get_result(data) {
  let query;
  try {
    query = JSON.parse(data).query;
  } catch (e) {
    query = data;
  }

  const response = await fetch('https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json');
  const result = await response.json();

  let answer = result.AbstractText;
  if (!answer && result.RelatedTopics && result.RelatedTopics.length > 0 && result.RelatedTopics[0].Text) {
    answer = result.RelatedTopics[0].Text;
  } else if (!answer && result.RelatedTopics && result.RelatedTopics.length > 0 && result.RelatedTopics[0].Topics && result.RelatedTopics[0].Topics.length > 0) {
    answer = result.RelatedTopics[0].Topics[0].Text; 
  }

  return JSON.stringify({
    answer: answer || 'No results found.',
    source: 'DuckDuckGo'
  });
}

window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
</script>
</body>
</html>
